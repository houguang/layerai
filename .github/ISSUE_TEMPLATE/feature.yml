name: 功能建议 / Feature request
description: 新功能或体验改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 当前痛点是什么？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposal
      description: 你希望产品如何改进
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案 / Alternatives
      description: 你考虑过的替代做法（可选）
