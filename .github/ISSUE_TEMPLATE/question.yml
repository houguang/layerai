name: Question
description: Usage questions, concepts, or how-to advice
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Please check the [docs](https://docs.layerai.yun) first.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe your question clearly
      placeholder: I'd like to know…
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Browser, extension version, related pages, or screenshots (optional)
      placeholder: Chrome 131 / LayerAI x.y.z …
